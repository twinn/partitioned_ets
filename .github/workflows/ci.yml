name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-1.19-28-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-1.19-28-

      - run: mix deps.get
      - run: mix format --check-formatted

  credo:
    name: Credo
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-1.19-28-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-1.19-28-

      - run: mix deps.get
      - run: mix credo --strict

  test:
    name: Test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - elixir: "1.19"
            otp: "28"

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-

      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: epmd -daemon
      - run: mix test

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-1.19-28-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-1.19-28-

      - uses: actions/cache@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-1.19-28-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-plt-1.19-28-

      - run: mix deps.get
      - run: mix dialyzer
